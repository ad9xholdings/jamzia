name: Deploy to Network Solutions

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via SFTP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "${{ secrets.JAMZIA_TV_2 }}","${{ secrets.JAMZIA_TV_3 }}" "${{ secrets.JAMZIA_TV }}" <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 60
          set net:max-retries 5
          mirror --reverse --continue --parallel=2             --exclude-glob .git*             --exclude-glob .github*             --exclude-glob node_modules*             --exclude-glob *.md             ./dist/public/ /htdocs/
          bye
          EOF
