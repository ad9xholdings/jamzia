name: Deploy to Network Solutions

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via SFTP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          export SSHPASS="${{ secrets.JAMZIA_TV_3 }}"
          sshpass -e sftp -oBatchMode=no -oStrictHostKeyChecking=no -oHostKeyAlgorithms=+ssh-rsa -oPubkeyAuthentication=no -P 22 "${{ secrets.JAMZIA_TV_2 }}@${{ secrets.JAMZIA_TV }}" <<EOF
          lcd ./dist/public/
          cd /htdocs/
          put -r .
          bye
          EOF
