name: Deploy to Network Solutions

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via LFTP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "${{ secrets.JAMZIA_TV_2 }}","${{ secrets.JAMZIA_TV_3 }}" "${{ secrets.JAMZIA_TV }}" <<EOF
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 10
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 2
          set ftp:passive-mode on
          set ftp:auto-sync-mode off
          set mirror:parallel-directories yes
          set mirror:parallel-transfer-count 2
          mirror --reverse --delete --verbose --continue             --exclude-glob .git*             --exclude-glob .github*             --exclude-glob node_modules*             --exclude-glob *.md             ./dist/public/ /htdocs/
          bye
          EOF
