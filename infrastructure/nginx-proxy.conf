# This configuration assumes:
#   - NGINX 1.25+ (with TLS 1.3 support)
#   - Let's Encrypt certificates managed by certbot
#   - Upstream: Kimi.show deployment (static SPA)
#   - All subdomains served from the same origin (SPA routing)

# ─── Global SSL Settings ───
ssl_protocols TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_ciphers ECDHE+AESGCM:ECDHE+CHACHA20;
ssl_session_cache shared:SSL:50m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# OCSP Stapling
ssl_stapling on;
ssl_stapling_verify on;

# ─── Upstream Definition ───
# Kimi.show origin (the static deployment)
upstream kimi_origin {
    server v66dfvk7ljd42.kimi.show:443;
    keepalive 32;
}

# ─── Server Block: jamzia.tv (root) ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jamzia.tv www.jamzia.tv;

    # SSL Certificates (Let's Encrypt / Cloudflare Origin)
    ssl_certificate /etc/letsencrypt/live/jamzia.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jamzia.tv/privkey.pem;

    # Security Headers (Charging Document §4.4)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:;" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Proxy to Kimi.show origin
    location / {
        proxy_pass https://kimi_origin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Performance (Charging Document §3.2: <3s P95)
        proxy_connect_timeout 3s;
        proxy_send_timeout 3s;
        proxy_read_timeout 3s;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            proxy_pass https://kimi_origin/$request_uri;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Health Check Endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ─── Server Block: app.jamzia.tv ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.jamzia.tv;

    ssl_certificate /etc/letsencrypt/live/jamzia.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jamzia.tv/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location / {
        proxy_pass https://kimi_origin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 3s;
        proxy_read_timeout 3s;
    }
}

# ─── Server Block: api.jamzia.tv ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.jamzia.tv;

    ssl_certificate /etc/letsencrypt/live/jamzia.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jamzia.tv/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Access-Control-Allow-Origin "https://app.jamzia.tv" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # API Rate Limiting (100 req/min per IP)
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass https://kimi_origin/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }
}

