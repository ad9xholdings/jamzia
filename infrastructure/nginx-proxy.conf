# ─── HTTP → HTTPS Redirect (all domains) ───
server {
    listen 80;
    listen [::]:80;
    server_name jamzia.tv www.jamzia.tv app.jamzia.tv api.jamzia.tv docs.jamzia.tv status.jamzia.tv audit.jamzia.tv;
    return 301 https://$host$request_uri;
}

