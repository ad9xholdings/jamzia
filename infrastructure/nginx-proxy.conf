# [ ] Install certbot: sudo apt install certbot python3-certbot-nginx
# [ ] Obtain cert: sudo certbot --nginx -d jamzia.tv -d www.jamzia.tv -d app.jamzia.tv -d api.jamzia.tv -d docs.jamzia.tv -d status.jamzia.tv -d audit.jamzia.tv
# [ ] Place this file: /etc/nginx/sites-available/jamzia
# [ ] Enable: sudo ln -s /etc/nginx/sites-available/jamzia /etc/nginx/sites-enabled/
# [ ] Test config: sudo nginx -t
# [ ] Reload: sudo systemctl reload nginx
# [ ] Verify SSL: curl -I https://app.jamzia.tv
